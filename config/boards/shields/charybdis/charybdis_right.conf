CONFIG_SPI=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_EXT_POWER=y

# PRECISION CONFIG — smooth, NO dead zone. CPI 200 is the sensor minimum
# (driver steps in units of 200: reg = cpi/200).
# DO NOT raise CPI and use CPI_DIVIDOR to fake a lower number. The driver does raw
# integer division of each poll's delta (pmw3610.c: x = delta / dividor) with NO
# remainder carry, so a slow turn (1..DIVIDOR-1 counts per poll) floors to 0 and is
# silently dropped — that was the "slow movement = no input" dead zone from 600/4.
# Keep DIVIDOR=1 so every count is reported.
# For finer-than-200 precision, scale DOWN in charybdis.keymap with
# &zip_xy_scaler <mult> <div> + track-remainders (that input processor carries the
# remainder, so it stays smooth). Travel speed = Layer 8 snipe (SNIPE_CPI), not CPI.
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=200
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_SNIPE_CPI=1000
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1
CONFIG_PMW3610_SCROLL_TICK=70
CONFIG_PMW3610_INVERT_X=y

CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_SMART_ALGORITHM=y

# CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=250

