CONFIG_SPI=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_EXT_POWER=y

# Precision target: CPI 600 / DIVIDOR 4 = 150 effective at the sensor.
# Paired with zip_xy_scaler 1:1 in charybdis.keymap (was 2:1 — the 2x axis
# doubling was the likely cause of the "can't make clean paths" distortion).
# Speed/travel is the Layer 8 snipe mode (SNIPE_CPI below), not the base scaler.
# These are the benchmarked starting values; refine via run_benchmark.ps1.
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=600
CONFIG_PMW3610_CPI_DIVIDOR=4
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_SNIPE_CPI=1000
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1
CONFIG_PMW3610_SCROLL_TICK=70
CONFIG_PMW3610_INVERT_X=y

CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_SMART_ALGORITHM=y

# CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=250

# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
