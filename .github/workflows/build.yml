name: Build ZMK Firmware

on: [push, workflow_dispatch]

jobs:
  matrix:
    runs-on: ubuntu-latest
    name: Fetch Build Matrix
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install yaml2json
        run: python3 -m pip install remarshal
      - name: Fetch Build Matrix
        id: set-matrix
        run: echo "matrix=$(yaml2json build.yaml | jq -c .)" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: matrix
    name: Build
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr Export
        run: west zephyr-export
      - name: West Build (${{ matrix.board }} - ${{ matrix.shield }})
        run: |
          if [ -n "${{ matrix.cmake-args }}" ]; then
            EXTRA_CMAKE_ARGS="${{ matrix.cmake-args }}"
          fi
          if [ -n "${{ matrix.snippet }}" ]; then
            SNIPPET_ARG="-S ${{ matrix.snippet }}"
          fi
          west build -s zmk/app -b ${{ matrix.board }} $SNIPPET_ARG -- -DSHIELD=${{ matrix.shield }} $EXTRA_CMAKE_ARGS -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename artifacts
        run: |
          mkdir build/artifacts
          if [ -f build/zephyr/zmk.uf2 ]; then
            cp build/zephyr/zmk.uf2 "build/artifacts/${{ matrix.board }}-${{ matrix.shield }}.uf2"
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}-${{ matrix.shield }}
          path: build/artifacts
