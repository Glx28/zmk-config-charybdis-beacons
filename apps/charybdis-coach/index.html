<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charybdis Coach</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 7h14a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3Zm2 3v4m4-4v4m4-4v4m4-3v2"/></svg>
        </div>
        <div>
          <h1>Charybdis Coach</h1>
          <p id="deviceLabel">USB Live Monitor</p>
        </div>
      </div>
      <div class="status-strip" aria-live="polite">
        <div class="status-pill layer-status"><span>Layer</span><strong id="activeLayer">0</strong></div>
        <div class="status-pill"><span>App</span><strong id="activeApp">Unknown</strong></div>
        <div class="status-pill"><span>Last</span><strong id="lastAction">Starting</strong></div>
        <div class="status-pill transport"><span>Transport</span><strong id="transport">USB</strong></div>
      </div>
      <button class="icon-button" id="fullscreenButton" type="button" title="Fullscreen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5m13-5h5v5M8 21H3v-5m18 0v5h-5"/></svg>
      </button>
    </header>

    <main class="workspace">
      <aside class="layer-rail" aria-label="Layers">
        <div class="rail-title">Layers</div>
        <div id="layerTabs" class="layer-tabs"></div>
      </aside>

      <section class="coach-stage" aria-label="Keyboard coach">
        <div class="stage-toolbar">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/></svg>
            <input id="searchInput" type="search" autocomplete="off" placeholder="Search keys, actions, apps">
          </label>
          <div class="view-toggles" role="group" aria-label="View mode">
            <button id="focusImportantButton" type="button">Focus</button>
            <button id="showAllButton" type="button" class="active">All</button>
          </div>
        </div>

        <div id="keyboardMap" class="keyboard-map" aria-label="Charybdis keyboard map"></div>
      </section>

      <aside class="inspector" aria-label="Selected action">
        <section class="panel selected-panel">
          <div class="panel-heading">
            <span id="selectedIcon" class="behavior-icon key"></span>
            <div>
              <h2 id="selectedTitle">Select a key</h2>
              <p id="selectedSubtitle">Layer details appear here</p>
            </div>
          </div>
          <dl class="detail-list">
            <div><dt>Behavior</dt><dd id="selectedBehavior">-</dd></div>
            <div><dt>Output</dt><dd id="selectedOutput">-</dd></div>
            <div><dt>Modifiers</dt><dd id="selectedModifiers">-</dd></div>
            <div><dt>Purpose</dt><dd id="selectedPurpose">-</dd></div>
            <div><dt>Notes</dt><dd id="selectedNotes">-</dd></div>
          </dl>
        </section>

        <section class="panel now-panel">
          <h2>Now</h2>
          <div class="now-grid">
            <div><span>Held</span><strong id="heldLayers">-</strong></div>
            <div><span>Locked</span><strong id="lockedLayer">-</strong></div>
            <div><span>Toggled</span><strong id="toggledLayers">-</strong></div>
            <div><span>State age</span><strong id="stateAge">-</strong></div>
          </div>
        </section>

        <section class="panel events-panel">
          <h2>Timeline</h2>
          <ol id="eventList" class="event-list"></ol>
        </section>

        <section class="panel apps-panel">
          <h2>Launcher Apps</h2>
          <div id="appList" class="app-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
