CONFIG_SPI=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_EXT_POWER=y

# Effective 150 DPI for precision. Sensor runs near the manufacturer-default 800 CPI.
# charybdis.keymap scales it by `&zip_xy_scaler 1 5`, whose track-remainders
# carry fractional movement smoothly. 750 x 0.2 x 1.0 (Windows 1:1) = 150.
# DIVIDOR stays 1: the driver's CPI_DIVIDOR is raw integer division of each poll's
# delta with NO remainder carry (pmw3610.c: x = delta/dividor) — at >1 it floors
# slow movement to 0 = "slow turn = no input" dead zone. NEVER use it to lower CPI.
# NOTE: SNIPE_CPI is the DRIVER's name for the snipe-layers CPI. Here it is repurposed
# as a SPEED-UP, not a slow sniper: SNIPE (3200) > base (750), so Layer 8 = faster.
# It's a tap-latch toggle (coach_travel_toggle on L1 4,2 / L2 11,3 / L3 11,2), not hold.
# The /5 scaler also affects it, so effective speed-mode = 3200 x 0.2 = 640
# vs 150 base. Raw Accel handles large movements above the jump threshold.
# Polling at native 250 Hz for smoother curves at this lower DPI.
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=750
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_SNIPE_CPI=3200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1
CONFIG_PMW3610_SCROLL_TICK=70
CONFIG_PMW3610_INVERT_X=y

CONFIG_PMW3610_POLLING_RATE_250=y
CONFIG_PMW3610_SMART_ALGORITHM=y

# CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=250

